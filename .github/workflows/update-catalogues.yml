name: Update catalogues

# Refresh the parsed catalogue library from BSData and publish it to GitHub Pages.
# Update-aware: a lightweight `check` job resolves BSData's latest commit and only
# runs the (heavy) parse/pack/deploy when that revision — or our config — has
# changed since the last successful publish. Runs on a schedule and on demand.
# Publishes ONLY catalogue data (manifest + packed IR), not the web app.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours; the no-op path is cheap, so updates land fast
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two publishes at once; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether there is anything new to build. Resolve BSData's HEAD commit and
  # probe a cache marker keyed by (upstream SHA + config hash). A hit means we have
  # already published exactly this revision with exactly this faction set → skip.
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.marker.outputs.cache-hit != 'true' }}
      sha: ${{ steps.upstream.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: upstream
        name: Resolve latest BSData revision
        env:
          # Authenticate the API call: unauthenticated requests share the runner's
          # egress IP under a 60/hour limit and can intermittently 403.
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO=$(jq -r .repo scripts/catalogues.config.json)
          REF=$(jq -r .ref scripts/catalogues.config.json)
          SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/commits/$REF" | jq -r .sha)
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "Could not resolve upstream SHA for $REPO@$REF" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "BSData $REPO@$REF is at $SHA"

      - id: marker
        name: Already published this revision + config?
        uses: actions/cache/restore@v4
        with:
          path: .bsdata-built
          key: bsdata-${{ steps.upstream.outputs.sha }}-${{ hashFiles('scripts/catalogues.config.json') }}
          lookup-only: true

      - if: steps.marker.outputs.cache-hit == 'true'
        run: echo "No change since the last successful publish — skipping the rebuild."

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version is taken from package.json "packageManager" (pnpm@9.12.0); specifying
      # it here too triggers ERR_PNPM_BAD_PM_VERSION on a mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/engine-parser/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/engine-parser/Cargo.toml') }}

      - run: pnpm install --frozen-lockfile

      - name: Build the catalogue library
        run: pnpm run update-catalogues

      - uses: actions/configure-pages@v5

      - name: Upload catalogue library as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # apps/web/public is gitignored → in CI it holds only what the pipeline
          # just wrote: catalogues.json + catalogues/*.ir.json.
          path: apps/web/public

  deploy:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Record the revision we just published, so the next `check` skips it. Runs only
  # after a fully successful build+deploy — a failed run leaves no marker, so the
  # next scheduled run retries the same revision instead of silently giving up.
  record:
    needs: [check, build, deploy]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ needs.check.outputs.sha }}" > .bsdata-built
      - uses: actions/cache/save@v4
        with:
          path: .bsdata-built
          key: bsdata-${{ needs.check.outputs.sha }}-${{ hashFiles('scripts/catalogues.config.json') }}
