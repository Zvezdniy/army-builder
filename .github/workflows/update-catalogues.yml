name: Update catalogues + stratagems

# Refresh the parsed catalogue library from BSData AND the stratagem library from
# Wahapedia, and publish both to GitHub Pages as one artifact.
# Update-aware: a lightweight `check` job resolves BSData's latest commit and only
# runs the (heavy) parse/pack/deploy when that revision — or our config (which the
# marker key hashes via scripts/**, so a stratagem-config change also triggers a
# rebuild) — has changed since the last successful publish. Runs on a schedule and
# on demand. Stratagems piggyback on the catalogue rebuild cadence: BSData changes
# far more often than Wahapedia's stratagem text, so they stay fresh in practice.
# GitHub Pages hosts a SINGLE artifact, so both libraries must ship together — a
# separate stratagem workflow deploying to Pages would overwrite the catalogues.
# Publishes the built web app AND the data together: `vite build` emits the app to
# apps/web/dist and copies the freshly-generated apps/web/public data into it, and
# that dist/ is the Pages artifact. The marker key also hashes the app + shared
# package sources, so an app-code change (not just a BSData/config change) triggers
# a rebuild + redeploy.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours; the no-op path is cheap, so updates land fast
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  # Lets the stratagem-fallback step below read + download prior Pages artifacts
  # (via the GitHub API) to recover the last-good stratagems when Wahapedia is down.
  actions: read

# Never run two publishes at once; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether there is anything new to build. Resolve BSData's HEAD commit for
  # EVERY configured edition (10e, 11e, ...) and probe a cache marker keyed by
  # (combined upstream fingerprint + config hash). A hit means we have already
  # published exactly this revision set with exactly this faction set → skip.
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.marker.outputs.cache-hit != 'true' }}
      fingerprint: ${{ steps.upstream.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v7

      - id: upstream
        name: Resolve latest BSData revision per edition
        env:
          # Authenticate the API call: unauthenticated requests share the runner's
          # egress IP under a 60/hour limit and can intermittently 403.
          GH_TOKEN: ${{ github.token }}
        run: |
          # Resolve one upstream SHA per edition and combine them into a single
          # fingerprint (e.g. "10e:<sha>_11e:<sha>"). Every edition's SHA MUST be
          # part of the key: if we keyed on only one edition's SHA, an upstream
          # commit that only touches another edition (e.g. an 11e-only BSData
          # update) would never change the fingerprint, the cache marker would
          # keep hitting, and that edition's data would silently freeze forever.
          #
          # Fed via process substitution (not a pipe) so `exit 1` inside the loop
          # actually aborts this step instead of only exiting a subshell.
          FINGERPRINT=""
          EDITION_COUNT=0
          while read -r ID REPO REF; do
            EDITION_COUNT=$((EDITION_COUNT + 1))
            SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/commits/$REF" | jq -r .sha)
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "Could not resolve upstream SHA for edition $ID ($REPO@$REF)" >&2
              exit 1
            fi
            echo "BSData $ID ($REPO@$REF) is at $SHA"
            if [ -z "$FINGERPRINT" ]; then
              FINGERPRINT="${ID}:${SHA}"
            else
              FINGERPRINT="${FINGERPRINT}_${ID}:${SHA}"
            fi
          done < <(jq -r '.editions[] | "\(.id) \(.repo) \(.ref)"' scripts/catalogues.config.json)

          if [ "$EDITION_COUNT" -eq 0 ]; then
            echo "scripts/catalogues.config.json has no editions — nothing to resolve" >&2
            exit 1
          fi

          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "Combined fingerprint across $EDITION_COUNT edition(s): $FINGERPRINT"

      - id: marker
        name: Already published this revision + config + pipeline code?
        uses: actions/cache/restore@v6
        with:
          # Rebuild when the upstream data (fingerprint — one SHA per edition) OR
          # anything that shapes our output changes: the faction config + pipeline
          # scripts + the Rust parser source + the web app and the packages it bundles
          # (so an app-code change alone triggers a rebuild + redeploy, not only a
          # BSData/config change). Keying on config alone let a parser/pipeline fix
          # land without a rebuild.
          path: .bsdata-built
          key: bsdata-${{ steps.upstream.outputs.fingerprint }}-${{ hashFiles('scripts/**', 'packages/engine-parser/src/**/*.rs', 'packages/engine-parser/Cargo.toml', 'apps/web/src/**', 'apps/web/index.html', 'apps/web/vite.config.ts', 'apps/web/package.json', 'packages/domain/src/**', 'packages/roster/src/**', 'packages/engine-eval/src/**', 'pnpm-lock.yaml') }}
          lookup-only: true

      - if: steps.marker.outputs.cache-hit == 'true'
        run: echo "No change since the last successful publish — skipping the rebuild."

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Version is taken from package.json "packageManager" (pnpm@9.12.0); specifying
      # it here too triggers ERR_PNPM_BAD_PM_VERSION on a mismatch.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          # `cache: pnpm` must stay EXPLICIT: since setup-node v6 the automatic
          # package-manager detection only enables caching for npm, so dropping this
          # input silently loses the pnpm store cache rather than defaulting to it.
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          # Cache only downloaded crates, NOT packages/engine-parser/target. Caching
          # the build output keyed on Cargo.toml alone served a stale binary when only
          # .rs sources changed; the crate itself compiles quickly, so always rebuild
          # it from the checked-out source and keep just the dependency download warm.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('packages/engine-parser/Cargo.toml') }}

      - run: pnpm install --frozen-lockfile

      - name: Build the catalogue library
        run: pnpm run update-catalogues

      - name: Build the stratagem library
        # Fetches Wahapedia's stratagem export → apps/web/public/stratagems.json +
        # stratagems/*.json. continue-on-error so a Wahapedia outage never blocks the
        # catalogue publish. On failure the fallback step below restores the last-good
        # stratagems from a prior artifact, so the panel keeps working across outages
        # (apps/web/public is a fresh gitignored dir each run — nothing persists here).
        run: pnpm run update-stratagems
        continue-on-error: true

      - name: Restore last-good stratagems if the fetch failed
        # Wahapedia is intermittently unreachable; because apps/web/public is rebuilt
        # from scratch every run, a failed fetch would drop stratagems from the site
        # entirely (the panel vanishes) until some later run happens to catch Wahapedia
        # up. Instead, when stratagems.json is absent, pull it (plus stratagems/*.json)
        # from the most recent prior "github-pages" artifact that still has it — the
        # last-good data lives in CI artifacts, never in git. Skipped when the fresh
        # fetch succeeded (stratagems.json present).
        if: hashFiles('apps/web/public/stratagems.json') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "stratagems.json is absent (Wahapedia fetch failed) — restoring last-good from a prior Pages artifact."
          ids=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50" \
            --jq '.artifacts[] | select(.name=="github-pages" and .expired==false) | .id')
          restored=""
          for id in $ids; do
            echo "  trying artifact $id ..."
            gh api "repos/${{ github.repository }}/actions/artifacts/$id/zip" > /tmp/pg.zip 2>/dev/null || continue
            rm -rf /tmp/pg && mkdir -p /tmp/pg
            unzip -o -q /tmp/pg.zip -d /tmp/pg || continue
            # upload-pages-artifact wraps the site in a plain artifact.tar (GNU tar).
            [ -f /tmp/pg/artifact.tar ] || continue
            if tar -tf /tmp/pg/artifact.tar ./stratagems.json >/dev/null 2>&1; then
              tar -xf /tmp/pg/artifact.tar -C apps/web/public ./stratagems.json ./stratagems
              echo "  restored stratagems from artifact $id"
              restored=1
              break
            fi
          done
          if [ -z "$restored" ]; then
            echo "  no prior artifact carried stratagems — the panel will stay hidden this run."
          fi

      - name: Build the web app
        # Emits apps/web/dist: the React app (base /army-builder/) plus a copy of
        # everything in apps/web/public — i.e. the catalogue + stratagem data the two
        # steps above just generated. dist/ is the single Pages artifact (app + data).
        run: pnpm --filter @muster/web build

      - uses: actions/configure-pages@v6

      - name: Upload the built app + data as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # apps/web/dist = the built app with the freshly-generated apps/web/public
          # data (catalogues.json + catalogues/*.ir.json, and stratagems.json +
          # stratagems/*.json when the stratagem step succeeded) copied in by Vite.
          path: apps/web/dist

  deploy:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # Record the revision we just published, so the next `check` skips it. Runs only
  # after a fully successful build+deploy — a failed run leaves no marker, so the
  # next scheduled run retries the same revision instead of silently giving up.
  record:
    needs: [check, build, deploy]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: echo "${{ needs.check.outputs.fingerprint }}" > .bsdata-built
      - uses: actions/cache/save@v6
        with:
          # Must match the check job's restore key exactly (byte-for-byte) or the
          # marker written here is never found by the next run's lookup.
          path: .bsdata-built
          key: bsdata-${{ needs.check.outputs.fingerprint }}-${{ hashFiles('scripts/**', 'packages/engine-parser/src/**/*.rs', 'packages/engine-parser/Cargo.toml') }}
