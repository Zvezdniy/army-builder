[package]
name = "engine-parser"
version = "0.0.0"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"

[lib]
name = "engine_parser"
path = "src/lib.rs"

[[bin]]
name = "muster-parse"
path = "src/bin/muster-parse.rs"

[dependencies]
quick-xml = "0.41"
zip = { version = "2.2", default-features = false, features = ["deflate"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[dev-dependencies]
proptest = "1"
